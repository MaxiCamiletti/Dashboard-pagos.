<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Financiero</title>

<style>

/* ===== BASE ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f8fafc;
  color: #1e293b;
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 30px;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.header h1 {
  margin: 0;
  font-size: 22px;
  font-weight: 600;
}

.search {
  padding: 10px;
  border: 1px solid #cbd5f5;
  border-radius: 6px;
  width: 250px;
}

/* ===== KPIs ===== */
.kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-bottom: 25px;
}

.card {
  background: white;
  border: 1px solid #e2e8f0;
  padding: 15px;
  border-radius: 8px;
}

.card h2 {
  margin: 0;
  font-size: 16px;
  color: #065f46;
}

.card p {
  margin: 5px 0 0;
  font-size: 13px;
  color: #64748b;
}

/* ===== TABLA ===== */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  text-align: left;
}

th {
  background: #f1f5f9;
  font-size: 13px;
  color: #475569;
}

tr {
  border-top: 1px solid #e2e8f0;
}

tr:hover {
  background: #f8fafc;
}

/* ===== BADGES ===== */
.badge {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
}

.bajo {
  background: #dcfce7;
  color: #166534;
}

.medio {
  background: #fff7ed;
  color: #9a3412;
}

.alto {
  background: #fee2e2;
  color: #991b1b;
}

/* ===== DETALLE MARCA (NARANJA SUTIL) ===== */
.accent {
  color: #f97316;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>Medios de Pago <span class="accent">| Dashboard</span></h1>
  <input class="search" id="search" placeholder="Buscar método...">
</div>

<div class="kpis">
  <div class="card"><h2 id="barato"></h2><p>Método más económico</p></div>
  <div class="card"><h2 id="rapido"></h2><p>Acreditación más rápida</p></div>
  <div class="card"><h2 id="seguro"></h2><p>Menor riesgo</p></div>
  <div class="card"><h2 id="promedio"></h2><p>Comisión promedio</p></div>
</div>

<table>
<thead>
<tr>
<th>Método</th>
<th>Comisión</th>
<th>Tiempo</th>
<th>Riesgo</th>
<th>Monto mínimo</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

</div>

<script>

/* DATA */
const data = [
{m:"Mercado Pago",c:6,t:2,r:"Medio",min:"$1000"},
{m:"Transferencia bancaria argentina",c:0,t:0,r:"Bajo",min:"$1000"},
{m:"Mercado Pago Crédito",c:10,t:10,r:"Alto",min:"$1000"},
{m:"Ualá",c:5,t:2,r:"Medio",min:"$1000"},
{m:"Transferencia pesos Bol",c:1,t:1,r:"Medio",min:"$50"},
{m:"Pix",c:0.8,t:0,r:"Bajo",min:"$50"},
{m:"Transferencia pesos Chi",c:1,t:1,r:"Medio",min:"$50"},
{m:"Transferencia pesos Col",c:1.2,t:1,r:"Medio",min:"$50"},
{m:"Nequi",c:1,t:1,r:"Medio",min:"$50"},
{m:"BTC",c:0.5,t:1,r:"Bajo",min:"$20"},
{m:"DAI",c:0.3,t:1,r:"Bajo",min:"$20"},
{m:"USDT",c:0.5,t:1,r:"Bajo",min:"$20"},
{m:"USDC",c:0.4,t:1,r:"Bajo",min:"$20"},
{m:"Transferencia en Euros",c:0.5,t:2,r:"Bajo",min:"€50"},
{m:"Wise EUR",c:0.6,t:1,r:"Bajo",min:"€50"},
{m:"Wise USD",c:0.6,t:1,r:"Bajo",min:"$50"},
{m:"Transferencia Pesos Mex",c:1.2,t:1,r:"Medio",min:"$100"},
{m:"Transferencia argentina USD",c:0.5,t:1,r:"Bajo",min:"$50"},
{m:"Neteller",c:3,t:2,r:"Alto",min:"$50"},
{m:"Paypal",c:5.4,t:2,r:"Alto",min:"$50"},
{m:"Payoneer",c:3,t:2,r:"Medio",min:"$50"},
{m:"Skrill",c:3.5,t:2,r:"Alto",min:"$50"},
{m:"Volet",c:2,t:1,r:"Medio",min:"$50"},
{m:"Zelle",c:0,t:0,r:"Bajo",min:"$50"},
{m:"Zinli",c:2,t:1,r:"Medio",min:"$50"},
{m:"Transferencia en Bolivares",c:1.5,t:1,r:"Alto",min:"$50"},
{m:"Pago Movil interbancario",c:0.5,t:0,r:"Bajo",min:"$20"}
];

/* RENDER */
const tabla = document.getElementById("tabla");

function render(datos){
  tabla.innerHTML="";
  datos.forEach(d=>{
    tabla.innerHTML += `
    <tr>
      <td>${d.m}</td>
      <td>${d.c}%</td>
      <td>${d.t} días</td>
      <td><span class="badge ${d.r.toLowerCase()}">${d.r}</span></td>
      <td>${d.min}</td>
    </tr>`;
  });
}

/* KPIs */
function calcularKPIs(){
  let barato = data.reduce((a,b)=> a.c<b.c?a:b);
  let rapido = data.reduce((a,b)=> a.t<b.t?a:b);
  let seguro = data.find(d=>d.r==="Bajo");
  let promedio = data.reduce((sum,d)=>sum+d.c,0)/data.length;

  document.getElementById("barato").innerText = barato.m;
  document.getElementById("rapido").innerText = rapido.m;
  document.getElementById("seguro").innerText = seguro.m;
  document.getElementById("promedio").innerText = promedio.toFixed(2)+"%";
}

/* BUSCADOR */
document.getElementById("search").addEventListener("keyup", e=>{
  const texto = e.target.value.toLowerCase();
  render(data.filter(d=>d.m.toLowerCase().includes(texto)));
});

/* INIT */
render(data);
calcularKPIs();

</script>

</body>
</html>
